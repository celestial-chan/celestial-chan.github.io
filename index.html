<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lyra hub</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="startpg" class="page active">

  <div class="splash-container">

    <h1 class="title">lyra hub</h1>
    <p id="splashtext" class="subtitle">loading world...</p>

    <div class="menu">

      <div class="card" onclick="playClick(); switchPage('homepg')">
        <h3>singleplayer</h3>
        <p>enter hub</p>
      </div>

      <div class="card" onclick="playClick(); switchPage('info')">
        <h3>profile</h3>
        <p>about me</p>
      </div>

      <div class="card" onclick="playClick(); switchPage('minecraft')">
        <h3>skyblock</h3>
        <p>grind stats</p>
      </div>

    </div>

  </div>
</div>

<!-- ================= HOME ================= -->
<div id="homepg" class="page">
  <h1>home</h1>

  <button onclick="playClick(); switchPage('info')">about me</button>
  <button onclick="playClick(); switchPage('minecraft')">minecraft</button>
  <button onclick="playClick(); switchPage('projects')">projects</button>
  <button onclick="playClick(); switchPage('settingspg')">settings</button>
</div>

<!-- ================= INFO ================= -->
<div id="info" class="page">
  <h1>about me</h1>

  <p>just a coder + gamer who builds random things at 2am</p>
  <p>mostly minecraft, websites, and chaos</p>

  <button onclick="playClick(); switchPage('homepg')">back</button>
</div>

<!-- ================= MINECRAFT ================= -->
<div id="minecraft" class="page">
  <h1>minecraft</h1>

  <p>skyblock grind zone</p>

  <button onclick="playClick(); switchPage('homepg')">back</button>
</div>

<!-- ================= PROJECTS ================= -->
<div id="projects" class="page">
  <h1>projects</h1>

  <p>unfinished ideas + experiments</p>

  <button onclick="playClick(); switchPage('homepg')">back</button>
</div>

<!-- ================= SETTINGS ================= -->
<div id="settingspg" class="page">
  <h1>settings</h1>

  <label>
    <input type="checkbox" id="skip">
    skip splash
  </label>

  <button onclick="switchPage('homepg')">back</button>
</div>

<!-- ambient particles -->
<div class="bg-glow"></div>

</body>
</html>
