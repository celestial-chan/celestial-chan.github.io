<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lyra hub</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<div class="bg-glow"></div>

<!-- ================= HUB (ONLY PAGE) ================= -->
<div class="hub">

  <div class="panel">

    <h1 class="title">lyra hub</h1>

    <!-- splash text becomes loading intro -->
    <p id="splashtext" class="subtitle">loading world...</p>

    <!-- MENU ALWAYS SAME PAGE -->
    <div class="menu">

      <div class="card" onclick="go('info')">profile</div>
      <div class="card" onclick="go('minecraft')">skyblock</div>
      <div class="card" onclick="go('projects')">projects</div>
      <div class="card" onclick="go('settings')">settings</div>

    </div>

  </div>

  <!-- ================= SECTIONS (same page, hidden blocks) ================= -->

  <div id="info" class="section hidden panel">
    <h1>about me</h1>
    <p>life is like roblox</p>
    <button onclick="go('home')">back</button>
  </div>

  <div id="minecraft" class="section hidden panel">
    <h1>skyblock</h1>
    <p>prison server grind</p>

    <div class="image-box">
      <img src="image/prison.png" alt="prison server">
    </div>

    <button onclick="go('home')">back</button>
  </div>

  <div id="projects" class="section hidden panel">
    <h1>projects</h1>
    <p>I forgor 💀</p>
    <button onclick="go('home')">back</button>
  </div>

  <div id="settings" class="section hidden panel">
    <h1>settings</h1>

    <label>
      <input type="checkbox" id="skip">
      skip loading text
    </label>

    <button onclick="go('home')">back</button>
  </div>

</div>

</body>
</html>
